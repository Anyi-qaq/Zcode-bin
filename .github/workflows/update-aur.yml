name: Check and Update AUR Package

on:
  schedule:
    # Run daily at 00:00 UTC (08:00 Beijing Time)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if versions match'
        required: false
        default: 'false'

jobs:
  update-aur:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup SSH for AUR
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.AUR_SSH_KEY }}
        
    - name: Configure Git
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        
    - name: Run update checker
      id: update
      run: |
        chmod +x zcode-update-checker.sh
        ./zcode-update-checker.sh --update
      continue-on-error: true
      
    - name: Check if PKGBUILD was updated
      id: check
      run: |
        if git diff --quiet PKGBUILD; then
          echo "No changes detected"
          echo "updated=false" >> $GITHUB_OUTPUT
        else
          echo "Changes detected"
          echo "updated=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Generate .SRCINFO
      if: steps.check.outputs.updated == 'true' || github.event.inputs.force_update == 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config
        # Install makepkg dependencies
        sudo apt-get install -y fakeroot
        # Generate SRCINFO
        makepkg --printsrcinfo > .SRCINFO
        
    - name: Commit changes
      if: steps.check.outputs.updated == 'true' || github.event.inputs.force_update == 'true'
      run: |
        git add PKGBUILD .SRCINFO
        git commit -m "Update to version $(grep '^pkgver=' PKGBUILD | cut -d'=' -f2 | tr -d '"')"
        
    - name: Push to GitHub
      if: steps.check.outputs.updated == 'true' || github.event.inputs.force_update == 'true'
      run: git push origin main
      
    - name: Push to AUR
      if: steps.check.outputs.updated == 'true' || github.event.inputs.force_update == 'true'
      run: |
        # Clone AUR repository
        git clone ssh://aur@aur.archlinux.org/zcode-bin.git aur-repo
        cd aur-repo
        
        # Copy updated files
        cp ../PKGBUILD .
        cp ../.SRCINFO .
        
        # Commit and push
        git add PKGBUILD .SRCINFO
        git commit -m "Update to version $(grep '^pkgver=' PKGBUILD | cut -d'=' -f2 | tr -d '"')"
        git push origin master
        
    - name: Get version for release
      if: steps.check.outputs.updated == 'true'
      id: version
      run: |
        VERSION=$(grep '^pkgver=' PKGBUILD | cut -d'=' -f2 | tr -d '"')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Create GitHub Release
      if: steps.check.outputs.updated == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: ZCode ${{ steps.version.outputs.version }}
        body: |
          Automatic update to version ${{ steps.version.outputs.version }}
          
          Changes:
          - Updated PKGBUILD version
          - Updated checksums
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
