name: Check and Update AUR Package

permissions:
  contents: write

on:
  schedule:
    # Run daily at 00:00 UTC (08:00 Beijing Time)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if versions match'
        required: false
        default: 'false'

jobs:
  update-aur:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup SSH for AUR
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.AUR_SSH_KEY }}

    - name: Configure Git
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"

    - name: Run update checker
      id: update
      run: |
        chmod +x zcode-update-checker.sh
        if [ "${{ github.event.inputs.force_update }}" = "true" ]; then
          sed -i 's/^pkgver=.*/pkgver=0.0.0/' PKGBUILD
        fi
        ./zcode-update-checker.sh --update

    - name: Check if PKGBUILD was updated
      id: check
      run: |
        FORCE="${{ github.event.inputs.force_update }}"
        NEW_VER=$(grep '^pkgver=' PKGBUILD | cut -d'=' -f2 | tr -d '"')
        echo "new_version=${NEW_VER}" >> $GITHUB_OUTPUT
        if [ "$FORCE" = "true" ]; then
          echo "Force update: pushing to AUR regardless of diff"
          echo "updated=true" >> $GITHUB_OUTPUT
        elif git diff --quiet PKGBUILD; then
          echo "No changes - already up to date"
          echo "updated=false" >> $GITHUB_OUTPUT
        else
          echo "Changes detected!"
          echo "updated=true" >> $GITHUB_OUTPUT
        fi

    - name: Sync .SRCINFO
      if: steps.check.outputs.updated == 'true'
      run: |
        T="$(printf '\t')"
        NEW_VER='${{ steps.check.outputs.new_version }}'
        sed -i "s/^${T}pkgver = .*/${T}pkgver = ${NEW_VER}/" .SRCINFO
        sed -i "s/^${T}pkgrel = .*/${T}pkgrel = 1/"           .SRCINFO
        sed -i "s|ZCode-[0-9.]*-linux-x64\.deb|ZCode-${NEW_VER}-linux-x64.deb|g" .SRCINFO
        sed -i "s|/releases/[0-9.]*/ZCode-|/releases/${NEW_VER}/ZCode-|g"      .SRCINFO
        echo "=== .SRCINFO ==="
        head -10 .SRCINFO

    - name: Commit and push to GitHub
      if: steps.check.outputs.updated == 'true' && github.event.inputs.force_update != 'true'
      run: |
        git add PKGBUILD .SRCINFO
        git commit -m "chore: update to ZCode ${{ steps.check.outputs.new_version }}"
        git push origin main

    - name: Push to AUR
      if: steps.check.outputs.updated == 'true'
      run: |
        set -e
        mkdir -p ~/.ssh
        ssh-keyscan -t ed25519,rsa,ecdsa aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
        echo "::group::Clone AUR repo"
        git clone ssh://aur@aur.archlinux.org/zcode-bin.git aur-repo
        echo "AUR remote: $(cd aur-repo && git remote get-url origin)"
        echo "AUR HEAD: $(cd aur-repo && git log -1 --oneline)"
        echo "::endgroup::"

        echo "::group::Update files"
        cd aur-repo
        cp ../PKGBUILD ../.SRCINFO . 2>/dev/null || true
        # Remove files no longer needed
        rm -f zcode.desktop zcode-bin.install
        git add PKGBUILD .SRCINFO
        git rm --ignore-unmatch zcode.desktop zcode-bin.install 2>/dev/null || true
        if [ -z "$(git status --porcelain)" ]; then
          echo "No changes to push to AUR"
          exit 0
        fi
        echo "Files to be committed:"
        git diff --cached --stat
        echo "::endgroup::"

        echo "::group::Commit and push"
        git commit -m "chore: update to ZCode ${{ steps.check.outputs.new_version }}"
        echo "Pushing to aur@aur.archlinux.org:zcode-bin.git (master)..."
        git push origin master
        echo "Push successful!"
        echo "::endgroup::"

    - name: Create GitHub Release
      if: steps.check.outputs.updated == 'true' && github.event.inputs.force_update != 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.check.outputs.new_version }}
        name: ZCode ${{ steps.check.outputs.new_version }}
        body: |
          Automatic update to ZCode ${{ steps.check.outputs.new_version }}

          - ZCode version: **${{ steps.check.outputs.new_version }}**
          - Build: upstream Linux .deb
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
